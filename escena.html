<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #contenedor {
            width: 100%; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            overflow: hidden; /* Importante para que el zoom no se salga */
        }

        /* ESTE ES EL FONDO QUE SE MUEVE */
        #fondo-imagen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            /* Definimos la transición para cambios suaves de imagen */
            transition: background-image 0.5s ease-in-out;
        }

        /* --- CLASES DE ANIMACIÓN --- */

        /* 1. Zoom Apasionado */
        .animacion-zoom {
            animation: zoomApasionado 5s ease-out forwards; /* Dura 5 segundos */
        }

        @keyframes zoomApasionado {
            from { transform: scale(1); } /* Tamaño normal */
            to { transform: scale(1.3); }   /* Se acerca un 30% */
        }

        /* 2. Destello de Pasión */
        .efecto-flash {
            animation: flashPasion 0.4s ease-out;
        }

        @keyframes flashPasion {
            0% { background-color: rgba(255, 0, 0, 0); }
            50% { background-color: rgba(255, 77, 77, 0.5); } /* Rojo suave */
            100% { background-color: rgba(255, 0, 0, 0); }
        }

        /* Capa para el efecto flash */
        #capa-efectos {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2; /* Sobre el fondo, bajo el texto */
            pointer-events: none; /* No interrumpe los clics */
        }

        /* --- ESTILO DEL CUADRO DE DIÁLOGO (Mantenemos tu diseño) --- */
        #ui-dialogo {
            background: rgba(255, 255, 255, 0.98); 
            width: 92%; 
            margin-bottom: 120px; 
            padding: 18px;
            border-radius: 15px;
            border-left: 8px solid #ff4d4d;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.6);
            cursor: pointer;
            box-sizing: border-box;
            z-index: 10; /* Siempre arriba */
            position: relative;
        }

        #nombre { font-weight: bold; color: #ff4d4d; font-size: 1.2em; text-transform: uppercase; margin-bottom: 5px; display: block; }
        #texto { color: #1a1a1a; font-size: 1.1em; line-height: 1.4; margin: 0; font-weight: 500; }
    </style>
</head>
<body onclick="avanzar()">
    <div id="contenedor">
        <div id="fondo-imagen"></div>
        
        <div id="capa-efectos"></div>

        <div id="ui-dialogo">
            <span id="nombre">Cargando...</span>
            <p id="texto">Toca para continuar...</p>
        </div>
    </div>

    <script src="historia.js"></script>
</body>
</html>
