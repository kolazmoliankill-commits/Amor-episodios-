<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&L Juego</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #contenedor { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: flex-end; position: relative; overflow: hidden; }
        #fondo-imagen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: all 1s ease-in-out; z-index: 1; }
        #contenedor-opciones { display: none; position: absolute; top: 35%; flex-direction: column; gap: 15px; width: 85%; z-index: 40; }
        .boton-opcion { background: white; color: #ff4d4d; border: 3px solid #ff4d4d; padding: 18px; border-radius: 50px; font-weight: bold; text-align: center; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        #ui-dialogo { background: rgba(255, 255, 255, 0.98); width: 92%; margin-bottom: 50px; padding: 20px; border-radius: 15px; border-left: 10px solid #ff4d4d; z-index: 50; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        #nombre { font-weight: bold; color: #ff4d4d; font-size: 1.2em; display: block; margin-bottom: 5px; }
        #texto { color: #1a1a1a; margin: 0; font-size: 1.1em; line-height: 1.4; }
        .zoom-vivo { transform: scale(1.15); }
    </style>
</head>
<body onclick="avanzar()">
    <div id="contenedor">
        <div id="fondo-imagen"></div>
        <div id="contenedor-opciones"></div>
        <div id="ui-dialogo">
            <span id="nombre"></span>
            <p id="texto"></p>
        </div>
    </div>
    <script src="historia.js"></script>
</body>
</html>
