<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #contenedor {
            width: 100%; height: 100vh;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center; /* Centra el cuadro horizontalmente */
            align-items: flex-end;   /* Lo empuja hacia abajo para luego subirlo con margin */
        }

        #ui-dialogo {
            background: rgba(255, 255, 255, 0.98); 
            width: 92%; 
            /* AQUÍ ESTÁ EL TRUCO: */
            margin-bottom: 120px; /* Aumenté este número para subirlo bastante */
            
            padding: 18px;
            border-radius: 15px;
            border-left: 8px solid #ff4d4d; /* Un detalle elegante a la izquierda */
            box-shadow: 0px 10px 30px rgba(0,0,0,0.6);
            cursor: pointer;
            box-sizing: border-box;
            z-index: 10;
        }

        #nombre {
            font-weight: bold;
            color: #ff4d4d;
            font-size: 1.2em;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        #texto {
            color: #1a1a1a;
            font-size: 1.1em;
            line-height: 1.4;
            margin: 0;
            font-weight: 500;
        }
    </style>
</head>
<body onclick="avanzar()">
    <div id="contenedor">
        <div id="ui-dialogo">
            <span id="nombre">Cargando...</span>
            <p id="texto">Toca para continuar...</p>
        </div>
    </div>

    <script src="historia.js"></script>
</body>
</html>
