<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestras Historias</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #contenedor {
            position: relative;
            height: 100vh;
            aspect-ratio: 9 / 16;
            /* Aquí ya queda fijo como portada.png */
            background: url('portada.png') no-repeat center center;
            background-size: contain;
            background-color: #000;
        }

        .btn-invisible {
            position: absolute;
            cursor: pointer;
            /* border: 2px solid rgba(255, 0, 0, 0.5); */ /* Descomenta si necesitas ver dónde caen los clics */
        }

        /* Coordenadas ajustadas para los 3 rectángulos verticales de la nueva portada */
        #temp1 { top: 25%; left: 8%; width: 84%; height: 19%; }
        #temp2 { top: 45%; left: 8%; width: 84%; height: 19%; }
        #temp3 { top: 65%; left: 8%; width: 84%; height: 19%; }

    </style>
</head>
<body>
    <div id="contenedor">
        <div class="btn-invisible" id="temp1" onclick="empezar('feliz')"></div>
        <div class="btn-invisible" id="temp2" onclick="empezar('ardiente')"></div>
        <div class="btn-invisible" id="temp3" onclick="empezar('todo')"></div>
    </div>

    <script>
        function empezar(tipo) {
            localStorage.setItem('historiaSeleccionada', tipo);
            window.location.href = 'escena.html';
        }
    </script>
</body>
</html>
